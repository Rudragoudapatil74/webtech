<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: powderblue;
            color: black;
        }
        h1:first-child{
            color: pink;
        }
        h1:last-child{
            color: aquamarine;
        }
        h1:nth-child(even){
            color: brown;
        }
        h1:first-of-type{
            color: chartreuse;
        }
        h1:last-of-type{
            color: darkorange;
        }
     </style>
</head>
<body>
    <h1>Hello1</h1>
    <h1>Hello2</h1>
    <h1>Hello3</h1>
    <h1>Hello4</h1>
    <h1>Hello5</h1>
    <h1>Hello6</h1>
    <h1>Hello7</h1>
    <h1>Hello8</h1>
    <h1>Hello9</h1>
</body>
</html>
