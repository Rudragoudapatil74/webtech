<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flipkart Clone</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f1f3f6;
      
    }

    .navbar-custom {
      background-color: #2874f0;
      
    }

    .navbar-brand {
      color: #fff !important;
      font-weight: bold;
      font-size: 22px;
    }

    .search-box {
      width: 420px;
    }

    .banner img {
      width: 50%;
      border-radius: 4px;
    }

    .product-card {
      transition: 0.25s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    .price {
      color: green;
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom px-3">
  <a class="navbar-brand" href="#">Flipkart</a>

  <form class="d-flex mx-auto">
    <input class="form-control search-box me-2" type="search" placeholder="Search for products">
    <button class="btn btn-warning">Search</button>
  </form>

  <button class="btn btn-light">Login</button>
</nav>

<div class="container mt-3 banner">
  <img src="https://images.unsplash.com/photo-1607082349566-187342175e2f" alt="Sale Banner">
</div>

<div class="container mt-4">
  <h4 class="mb-3">Top Deals</h4>
  <div class="row g-3">

    <div class="col-md-3">
      <div class="card product-card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" class="card-img-top" alt="Phone">
        <div class="card-body text-center">
          <h5 class="card-title">Smartphone</h5>
          <p class="price">₹14,999</p>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card product-card">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" class="card-img-top" alt="Laptop">
        <div class="card-body text-center">
          <h5 class="card-title">Laptop</h5>
          <p class="price">₹54,999</p>
        </div>
      </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
