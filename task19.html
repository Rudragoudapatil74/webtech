<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: rgba(255, 0, 0, 0.5);
        }
        h2{
            background-color: rgb(0, 254, 0);
        }
        h3{
            background-color: hsl(60deg, 40%, 50%);
        }
        h4{
            background-color: hsla(120deg, 60%, 50%, 0.3);
        }
        h5{
            background-color: #ff0077;
        }
    </style>
</head>
<body>
    <h1>Hello1</h1>
    <h2>Hello2</h2>
    <h3>Hello3</h3>
    <h4>Hello4</h4>
    <h5>Hello5</h5>
</body>
</html>
