<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
        }
      nav{
        height: 100px;
        border: 2px solid black;
        background-color: gold;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    #logoblock,#menublock{
        height: 100pxpx;
        width: 400px;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        
    }
    #logoblock{
        height: 85px;
        mix-blend-mode: multiply;
    }
    #menublock>a{
        text-decoration: none;
        color: black;
    }
    #photoblock{
        height: 100vh;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        background-color: lightgrey;
    }
    #left,#right{
        height: 400px;
        width: 400px;
        align-items: center;
        justify-content: space-evenly;
        display: flex;
        background-color: white;
        border-radius: 30px;
        box-shadow: 0px 0px 12px rgba(0.5);

    }
    #photoblock img{
        height: 300px;  
    }
    </style>
</head>
<body>
    <nav>
        <div id="logoblock">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQe-HX4oq0R8-olvPHMnWRTSbepZk7rRvFvHw&s" alt="music">

        </div>
        <div id="menublock">
            <a href="">HOME</a>
            <a href="">ABOUT</a>
            <a href="">CONTACT</a>
            <a href="">PROFILE</a>
        </div>
    </nav>
    <br><br>
    <div id="photoblock">
        <div id="left">
            <img src="https://images.macrumors.com/t/zWmrArK4r8cBRY__BVbBK6PiaQ0=/400x0/article-new/2020/05/airpods-pro-max-in-silver.jpg?lossy" alt="buds">
        </div>
        <div id="right">
            <img src="https://in.static.webuy.com/product_images/Electronics/Headphones%20-%20Apple/SHEAAAPMOESBA_l.jpg" alt="buds">
        </div>
    </div>
    
</body>
</html>
